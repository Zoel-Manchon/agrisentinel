# ── agrisentinel · mosquitto (mTLS) ────────────────────────────────
# Solo TLS mutuo en 8883. Cada nodo se autentica con su certificado;
# su CN (= node-id = key_id) se usa como username MQTT.

listener 8883
cafile   /mosquitto/certs/ca.crt
certfile /mosquitto/certs/broker.crt
keyfile  /mosquitto/certs/broker.key

require_certificate true          # exige cert de cliente -> mTLS
use_identity_as_username true     # el CN del cert pasa a ser el username
tls_version tlsv1.2

# Revocación por nodo (descomenta tras generar crl.pem con revoke-node.sh):
# crlfile /mosquitto/certs/crl.pem

allow_anonymous false
persistence true
persistence_location /mosquitto/data/
